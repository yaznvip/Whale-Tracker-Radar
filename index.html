<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB Live Whale Radar Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: white; }
        .movement-alert { animation: pulse-red 2s infinite; border: 2px solid #ef4444 !important; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .log-entry { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-6 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-green-500">AYO RADAR <span class="text-xs bg-green-900/30 px-2 py-1 rounded">V2.1 PRO</span></h1>
                <div id="totalValue" class="text-white font-mono text-lg mt-1">Total Assets: <span class="text-green-400">$0.00</span></div>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-3">
                <a href="https://www.linkedin.com/in/ayoup-alhaj-ali-4385b02ba" target="_blank" class="bg-[#0077b5] hover:bg-[#005c8c] text-white text-[10px] md:text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2">LINKEDIN</a>
                <a href="https://t.me/Ayoupalhaj" target="_blank" class="bg-[#0088cc] hover:bg-[#006699] text-white text-[10px] md:text-xs font-bold py-2 px-4 rounded-lg transition-all flex items-center gap-2">TELEGRAM</a>
                <div id="connectionStatus" class="flex items-center gap-2 text-[10px] font-mono text-slate-500 border-l border-slate-700 pl-3">
                    <span class="w-2 h-2 bg-slate-600 rounded-full"></span> OFFLINE
                </div>
            </div>
        </header>

        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="walletAddr" placeholder="Enter Wallet Address..." 
                    class="flex-1 bg-slate-950 border border-slate-700 p-4 rounded-xl focus:outline-none focus:border-green-500 font-mono text-sm">
                <div class="flex gap-2">
                    <button onclick="startMonitoring()" id="btnStart" class="bg-green-600 hover:bg-green-500 px-6 py-4 rounded-xl font-bold transition-all flex-1 text-xs">START</button>
                    <button onclick="stopMonitoring()" id="btnStop" class="bg-red-600 hover:bg-red-500 px-6 py-4 rounded-xl font-bold transition-all hidden text-xs">STOP</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="assetsGrid"></div>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
            <div class="p-4 bg-slate-800/50 border-b border-slate-800 font-bold text-slate-300">Live Movement Log</div>
            <div id="logContainer" class="max-h-[300px] overflow-y-auto p-4 space-y-2 font-mono text-xs text-slate-400">
                <div class="italic">Ready for target input...</div>
            </div>
        </div>
    </div>

    <script>
        const RPC_URL = "https://eth.drpc.org";
        const provider = new ethers.providers.JsonRpcProvider(RPC_URL);
        const ERC20_ABI = ["function balanceOf(address) view returns (uint256)", "function decimals() view returns (uint8)"];
        
        const TOKENS = [
            { symbol: "USDT", address: "0xdAC17F958D2ee523a2206206994597C13D831ec7", price: 1 },
            { symbol: "USDC", address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eb48", price: 1 },
            { symbol: "DAI", address: "0x6B175474E89094C44Da98b954EedeAC495271d0F", price: 1 },
            { symbol: "PEPE", address: "0x6982508145454Ce325dDbE47a25d4ec3d2311933", price: 0.000008 },
            { symbol: "SHIB", address: "0x95aD61b0a150d79219dcf64E1E6Cc01f0B64C4cE", price: 0.00002 }
        ];

        let balanceMemory = {};
        let monitorInterval = null;
        let ethPrice = 2500; 

        async function startMonitoring() {
            const address = document.getElementById('walletAddr').value.trim();
            if(!ethers.utils.isAddress(address)) return alert("Invalid Address!");

            toggleButtons(true);
            pushLog("System", `Initializing Radar for: ${address.substring(0,10)}...`);
            
            await performScan(address);
            monitorInterval = setInterval(() => performScan(address), 15000);
        }

        function stopMonitoring() {
            clearInterval(monitorInterval);
            toggleButtons(false);
            pushLog("System", "Monitoring Stopped.", false);
        }

        function toggleButtons(isRunning) {
            document.getElementById('btnStart').classList.toggle('hidden', isRunning);
            document.getElementById('btnStop').classList.toggle('hidden', !isRunning);
            document.getElementById('walletAddr').disabled = isRunning;
            document.getElementById('connectionStatus').innerHTML = isRunning ? 
                `<span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> LIVE` : 
                `<span class="w-2 h-2 bg-slate-600 rounded-full"></span> OFFLINE`;
        }

        async function performScan(address) {
            let totalUSD = 0;
            try {
                const ethRaw = await provider.getBalance(address);
                const ethBal = parseFloat(ethers.utils.formatEther(ethRaw)).toFixed(4);
                totalUSD += ethBal * ethPrice;
                handleBalanceUpdate("ETH", ethBal);

                for (const t of TOKENS) {
                    const contract = new ethers.Contract(t.address, ERC20_ABI, provider);
                    const balRaw = await contract.balanceOf(address);
                    const dec = await contract.decimals();
                    const bal = (Number(balRaw) / Math.pow(10, Number(dec))).toFixed(2);
                    
                    if (parseFloat(bal) > 0) {
                        totalUSD += bal * t.price;
                        handleBalanceUpdate(t.symbol, bal);
                    }
                }
                document.getElementById('totalValue').innerHTML = `Total Assets: <span class="text-green-400">$${totalUSD.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>`;
            } catch (e) { console.error("Scan Error"); }
        }

        function handleBalanceUpdate(symbol, newBal) {
            const oldBal = balanceMemory[symbol];
            if (oldBal !== undefined && oldBal !== newBal) {
                pushLog(symbol, `CHANGE: ${oldBal} -> ${newBal}`, true);
                triggerVisualAlert(symbol);
            }
            balanceMemory[symbol] = newBal;
            updateAssetCard(symbol, newBal);
        }

        function updateAssetCard(symbol, bal) {
            let card = document.getElementById(`card-${symbol}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${symbol}`;
                card.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 log-entry";
                document.getElementById('assetsGrid').appendChild(card);
            }
            card.innerHTML = `<span class="text-slate-500 text-[10px] block font-bold">${symbol}</span>
                             <span class="text-xl font-bold text-green-400">${bal}</span>`;
        }

        function pushLog(asset, msg, isAlert = false) {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry p-2 rounded ${isAlert ? 'bg-red-900/20 text-red-400 border border-red-900/40' : 'text-slate-400 border-l-2 border-green-600 pl-3'}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] <b>${asset}:</b> ${msg}`;
            container.prepend(entry);
        }

        function triggerVisualAlert(symbol) {
            const card = document.getElementById(`card-${symbol}`);
            if(card) {
                card.classList.add('movement-alert');
                setTimeout(() => card.classList.remove('movement-alert'), 5000);
            }
        }
    </script>
</body>
</html>
